<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>

<h2>Личная страница пользователя</h2>

<p th:text="'Имя: ' + ${user.username}">VALUE</p>
<p th:text="'Номер ID: '+ ${user.id}">VALUE</p>
<p th:text="'Возраст: '+ ${user.age}">VALUE</p>
<p th:text="'Email: '+  ${user.email}">VALUE</p>

<h3>Роли:</h3>
<ul>
    <li th:each="role : ${user.roles}" th:text="${role.name}">ROLE</li>
</ul>

<br/><br/>
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

</body>
</html>
